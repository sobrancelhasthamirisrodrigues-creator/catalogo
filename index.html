<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thamiris Rodrigues - catálogo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <header class="catalog-header">
        <h1 class="brand-name">Thamiris Rodrigues</h1>
        <p class="catalog-subtitle">Face/Eyebrows</p>
        <p class="services-subtitle">Nossos serviços</p>
    </header>

    <main class="catalog-container">
        <div class="catalog-list">
            <div class="catalog-item">
                <img src="Thamiris01.jpg" alt="Micropigmentação 01" loading="lazy" decoding="async">
            </div>
            <div class="catalog-item">
                <img src="Thamiris02.jpg" alt="Micropigmentação 02" loading="lazy" decoding="async">
            </div>
            <div class="catalog-item">
                <img src="Thamiris03.jpg" alt="Micropigmentação 03" loading="lazy" decoding="async">
            </div>
            <div class="catalog-item">
                <img src="Thamiris04.jpg" alt="Micropigmentação 04" loading="lazy" decoding="async">
            </div>
            <div class="catalog-item">
                <img src="Thamiris05.jpg" alt="Micropigmentação 05" loading="lazy" decoding="async">
            </div>
            <div class="catalog-item">
                <img src="Thamiris06.jpg" alt="Micropigmentação 06" loading="lazy" decoding="async">
            </div>
            <div class="catalog-item">
                <img src="Thamiris07.jpg" alt="Micropigmentação 07" loading="lazy" decoding="async">
            </div>
            <div class="catalog-item">
                <img src="Thamiris08.jpg" alt="Micropigmentação 08" loading="lazy" decoding="async">
            </div>
            <div class="catalog-item">
                <img src="Thamiris09.jpg" alt="Micropigmentação 09" loading="lazy" decoding="async">
            </div>
        </div>
    </main>

    <section class="download-section">
        <div class="download-container">
            <h2 class="download-title">Leve nosso catálogo</h2>
            <p class="download-description">Baixe o catálogo completo e tenha acesso a todos nossos trabalhos no seu celular</p>
            <button class="download-btn" onclick="downloadCatalog()">
                <span class="btn-icon">📱</span>
                <span class="btn-text">Baixar Catálogo PDF</span>
                <span class="btn-arrow">→</span>
            </button>
        </div>
    </section>

    <footer class="catalog-footer">
        <p>&copy; 2024 Thamiris Rodrigues</p>
        <p>contato@thamirisrodrigues.com.br</p>
    </footer>
</body>
</html>
